<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="personalhub is a lightweight static profile site for links, projects, notes, and background information."
    />
    <title>personalhub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header" data-site-header>
      <div class="container header-shell">
        <a class="brand" href="#top" data-site-name>personalhub</a>
        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          data-nav-toggle
        >
          <span class="nav-toggle__label">Menu</span>
        </button>
        <nav class="site-nav" id="site-nav" data-site-nav>
          <ul class="site-nav__list">
            <li><a href="#links">Links</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#misc">Misc</a></li>
            <li><a href="#about">About</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <section class="hero section" id="top" aria-labelledby="hero-title">
        <div class="container hero__layout">
          <div class="hero__content">
            <p class="eyebrow" data-site-tagline></p>
            <h1 id="hero-title" data-site-title></h1>
            <p class="hero__intro" data-site-intro></p>
          </div>
          <div class="hero__meta" data-hero-meta></div>
        </div>
      </section>

      <section class="section" id="links" aria-labelledby="links-title">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow">Primary links</p>
            <h2 id="links-title">Start here</h2>
          </div>
          <div class="cards-grid cards-grid--links" data-links-grid></div>
        </div>
      </section>

      <section class="section" id="projects" aria-labelledby="projects-title">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow">Featured work</p>
            <h2 id="projects-title">Selected projects</h2>
          </div>
          <div class="cards-grid" data-projects-grid></div>
        </div>
      </section>

      <section class="section" id="misc" aria-labelledby="misc-title">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow">Notes and extras</p>
            <h2 id="misc-title">Miscellaneous</h2>
          </div>
          <div class="cards-grid cards-grid--misc" data-misc-grid></div>
        </div>
      </section>

      <section class="section" id="about" aria-labelledby="about-title">
        <div class="container">
          <div class="section-heading">
            <p class="eyebrow">Background</p>
            <h2 id="about-title">About</h2>
          </div>
          <article class="about-panel" data-about-copy></article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__layout" data-footer-meta></div>
    </footer>

    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
