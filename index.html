<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>personalhub</title>
    <meta name="description" content="" />
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/personalhub" />
    <meta property="og:image" content="https://example.com/assets/share-image.jpg" />
    <meta property="og:image:alt" content="Placeholder share image for the Personal Hub page." />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      @layer base, components, utilities;

      @layer base {
        :root {
          color-scheme: light;
          --color-bg: #f4f7fb;
          --color-surface: #ffffff;
          --color-surface-muted: #eef3f8;
          --color-text: #142033;
          --color-text-muted: #4a5a70;
          --color-border: #d3dce8;
          --color-accent: #175cd3;
          --color-accent-strong: #0f4bb5;
          --color-focus: #ff9f1c;
          --shadow-soft: 0 18px 50px rgba(20, 32, 51, 0.08);
          --radius-sm: 0.625rem;
          --radius-md: 1rem;
          --radius-lg: 1.5rem;
          --space-2xs: 0.375rem;
          --space-xs: 0.5rem;
          --space-sm: 0.75rem;
          --space-md: 1rem;
          --space-lg: 1.5rem;
          --space-xl: 2rem;
          --space-2xl: 3rem;
          --font-size-sm: 0.95rem;
          --font-size-md: 1rem;
          --font-size-lg: clamp(1.125rem, 1.05rem + 0.35vw, 1.3rem);
          --font-size-xl: clamp(1.5rem, 1.15rem + 1vw, 2.2rem);
          --font-size-2xl: clamp(2.3rem, 1.7rem + 2vw, 3.6rem);
          --line-height-tight: 1.2;
          --line-height-body: 1.65;
          --line-height-loose: 1.8;
          --tap-target: 2.75rem;
          --container-mobile: min(100% - 1.5rem, 40rem);
          --container-tablet: min(100% - 3rem, 56rem);
          --container-desktop: min(100% - 4rem, 72rem);
        }

        * {
          box-sizing: border-box;
        }

        html {
          scroll-behavior: smooth;
        }

        body {
          margin: 0;
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background: linear-gradient(180deg, #f8fbff 0%, var(--color-bg) 100%);
          color: var(--color-text);
          font-size: var(--font-size-md);
          line-height: var(--line-height-body);
        }

        img {
          max-width: 100%;
          display: block;
        }

        a {
          color: var(--color-accent);
          text-decoration-thickness: 0.08em;
          text-underline-offset: 0.18em;
        }

        a:hover {
          color: var(--color-accent-strong);
        }

        a,
        button,
        .nav-link {
          min-height: var(--tap-target);
        }

        a:focus-visible,
        button:focus-visible,
        .nav-link:focus-visible {
          outline: 3px solid var(--color-focus);
          outline-offset: 3px;
          border-radius: var(--radius-sm);
        }

        h1,
        h2,
        h3,
        p,
        ul {
          margin-top: 0;
        }

        h1,
        h2,
        h3 {
          line-height: var(--line-height-tight);
          letter-spacing: -0.02em;
        }

        h1 {
          font-size: var(--font-size-2xl);
          margin-bottom: var(--space-md);
        }

        h2 {
          font-size: var(--font-size-xl);
          margin-bottom: var(--space-lg);
        }

        h3 {
          font-size: var(--font-size-lg);
          margin-bottom: var(--space-sm);
        }

        p,
        li {
          color: var(--color-text-muted);
          max-width: 70ch;
        }

        ul {
          padding-left: 1.25rem;
        }

        section {
          scroll-margin-top: 5rem;
        }

        @media (max-width: 767px) {
          .container {
            width: var(--container-mobile);
          }
        }

        @media (min-width: 768px) and (max-width: 1099px) {
          .container {
            width: var(--container-tablet);
          }
        }

        @media (min-width: 1100px) {
          .container {
            width: var(--container-desktop);
          }
        }

        @media (prefers-reduced-motion: reduce) {
          html {
            scroll-behavior: auto;
          }

          *,
          *::before,
          *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
          }
        }
      }

      @layer components {
        .container {
          margin-inline: auto;
        }

        .site-header {
          position: sticky;
          top: 0;
          z-index: 10;
          backdrop-filter: blur(12px);
          background: rgba(248, 251, 255, 0.9);
          border-bottom: 1px solid rgba(211, 220, 232, 0.8);
        }

        .header-inner,
        .hero,
        .section-grid,
        .site-footer {
          padding-block: var(--space-lg);
        }

        .header-inner {
          display: flex;
          gap: var(--space-md);
          align-items: center;
          justify-content: space-between;
        }

        .brand {
          display: inline-flex;
          align-items: center;
          gap: var(--space-sm);
          font-weight: 700;
          color: var(--color-text);
          text-decoration: none;
        }

        .brand-mark {
          display: grid;
          place-items: center;
          width: 2.5rem;
          height: 2.5rem;
          border-radius: 50%;
          background: #dce9ff;
          color: #12326b;
          font-weight: 800;
        }

        .site-nav {
          display: flex;
          flex-wrap: wrap;
          gap: var(--space-xs);
        }

        .nav-link,
        .button-link,
        .button,
        .external-link {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 0.4rem;
          padding: 0.7rem 1rem;
          border-radius: var(--radius-sm);
          text-decoration: none;
          font-weight: 600;
        }

        .nav-link {
          color: var(--color-text);
        }

        .nav-link:hover,
        .nav-link:focus-visible {
          background: #e7eef9;
        }

        .hero {
          display: grid;
          gap: var(--space-xl);
          padding-block: var(--space-2xl);
        }

        .hero-card,
        .card {
          background: var(--color-surface);
          border: 1px solid var(--color-border);
          border-radius: var(--radius-lg);
          box-shadow: var(--shadow-soft);
          padding: var(--space-xl);
        }

        .hero-card {
          display: grid;
          gap: var(--space-md);
        }

        .eyebrow {
          display: inline-flex;
          align-items: center;
          gap: 0.4rem;
          color: #12326b;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.08em;
          font-size: 0.8rem;
        }

        .hero-actions,
        .footer-links {
          display: flex;
          flex-wrap: wrap;
          gap: var(--space-sm);
        }

        .button-link,
        .button {
          background: var(--color-accent);
          color: #ffffff;
          border: 1px solid var(--color-accent);
        }

        .button-link:hover,
        .button-link:focus-visible,
        .button:hover,
        .button:focus-visible {
          background: var(--color-accent-strong);
          color: #ffffff;
        }

        .button-link.secondary {
          background: var(--color-surface);
          color: var(--color-text);
          border-color: var(--color-border);
        }

        .button-link.secondary:hover,
        .button-link.secondary:focus-visible {
          background: var(--color-surface-muted);
        }

        .section-grid {
          display: grid;
          gap: var(--space-xl);
        }

        .card-grid {
          display: grid;
          gap: var(--space-lg);
          grid-template-columns: repeat(auto-fit, minmax(16rem, 1fr));
        }

        .card {
          display: grid;
          gap: var(--space-md);
          align-content: start;
        }

        .card:hover,
        .card:focus-within {
          border-color: #b6c8df;
          transform: translateY(-2px);
          transition: transform 160ms ease, border-color 160ms ease;
        }

        .card p {
          margin-bottom: 0;
        }

        .card__title-row {
          display: flex;
          flex-wrap: wrap;
          gap: var(--space-sm);
          align-items: center;
          justify-content: space-between;
        }

        .card__meta {
          display: flex;
          flex-wrap: wrap;
          gap: var(--space-xs);
          list-style: none;
          padding-left: 0;
          margin: 0;
        }

        .badge {
          width: fit-content;
          border-radius: 999px;
          padding: 0.45rem 0.8rem;
          font-size: 0.92rem;
          font-weight: 600;
          background: #eef2f7;
          color: #364152;
          border: 1px solid #d5dde8;
        }

        .badge.link {
          background: #f4f2ff;
          color: #5b3dc4;
          border-color: #ddd5ff;
        }

        .external-link {
          justify-content: flex-start;
          width: fit-content;
          color: var(--color-text);
          background: var(--color-surface-muted);
          border: 1px solid transparent;
        }

        .external-link:hover,
        .external-link:focus-visible {
          border-color: #b6c8df;
          background: #e4edf8;
          color: var(--color-text);
        }

        .external-label {
          color: var(--color-text-muted);
          font-size: 0.88rem;
          font-weight: 500;
          overflow-wrap: anywhere;
        }

        .site-footer {
          display: flex;
          flex-wrap: wrap;
          justify-content: space-between;
          gap: var(--space-md);
          border-top: 1px solid var(--color-border);
          margin-top: var(--space-2xl);
          padding-bottom: var(--space-2xl);
        }
      }

      @layer utilities {
        .muted {
          color: var(--color-text-muted);
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="#top">
          <span class="brand-mark" aria-hidden="true">PH</span>
          <span data-site-name></span>
        </a>
        <nav class="site-nav" aria-label="Primary" data-site-nav></nav>
      </div>
    </header>

    <main id="top">
      <section class="container hero" aria-labelledby="hero-title">
        <article class="hero-card">
          <p class="eyebrow" data-hero-eyebrow></p>
          <h1 id="hero-title" data-hero-title></h1>
          <p data-hero-subtitle></p>
          <p data-hero-description></p>
          <div class="hero-actions" data-hero-actions></div>
        </article>
      </section>

      <section class="container section-grid" id="social-links" aria-labelledby="social-title">
        <div>
          <h2 id="social-title" data-social-title></h2>
          <p data-social-description></p>
        </div>
        <div class="card-grid" data-links-grid></div>
      </section>

      <section class="container section-grid" id="featured-projects" aria-labelledby="projects-title">
        <div>
          <h2 id="projects-title" data-projects-title></h2>
          <p data-projects-description></p>
        </div>
        <div class="card-grid" data-projects-grid></div>
      </section>

      <section class="container section-grid" id="about" aria-labelledby="about-title">
        <div>
          <h2 id="about-title" data-about-title></h2>
          <p data-about-description></p>
        </div>
        <div class="hero-card" data-about-copy></div>
      </section>
    </main>

    <footer class="container site-footer" id="footer" data-footer-meta></footer>
    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
